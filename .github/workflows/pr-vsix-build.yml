name: PR VSIX Build
run-name: >-
  ${{ format('PR VSIX Build PR #{0} head {1} base {2} merge {3} action {4}', github.event.client_payload.pull_request_number, github.event.client_payload.head_sha, github.event.client_payload.base_sha, github.event.client_payload.merge_sha, github.event.client_payload.cause) }}

on:
  repository_dispatch:
    types:
      - refresh-pr-vsix

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-vsix-build-${{ github.event.client_payload.pull_request_number }}
  cancel-in-progress: true

jobs:
  test-build:
    outputs:
      build: ${{ steps.context.outputs.build }}
      pull-request-number: ${{ steps.context.outputs.pull-request-number }}
      targets: ${{ steps.targets.outputs.targets }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out trusted workflow helpers
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version-file: .nvmrc

      - name: Resolve immutable build context
        id: context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_VSIX_API_RETRY_ATTEMPTS: 4
          PR_VSIX_API_RETRY_BASE_MS: 1000
          PR_VSIX_API_RETRY_MAX_MS: 60000
          PR_VSIX_MERGE_ATTEMPTS: 12
          PR_VSIX_MERGE_INTERVAL_MS: 5000
        run: node scripts/ci/resolve-pr-vsix-context.mjs

      - name: Resolve platform targets
        id: targets
        if: steps.context.outputs.build == 'true'
        run: echo "targets=$(node -p "JSON.stringify(require('./scripts/release/targets.json'))")" >> "$GITHUB_OUTPUT"

      - name: Check out immutable build context
        if: steps.context.outputs.build == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ steps.context.outputs.checkout-sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install dependencies
        if: steps.context.outputs.build == 'true'
        run: npm ci

      - name: Run test suite
        if: steps.context.outputs.build == 'true'
        run: npm test

      - name: Build production bundle
        if: steps.context.outputs.build == 'true'
        run: npm run vscode:prepublish

      - name: Build platform VSIX bundle
        if: steps.context.outputs.build == 'true'
        env:
          VSIX_BASENAME: better-todo-tree-pr-${{ steps.context.outputs.pull-request-number }}
        run: |
          rm -rf artifacts/vsix
          SKIP_PREPUBLISH=1 node scripts/release/build-vsix.mjs all
          node scripts/ci/verify-pr-vsix.mjs artifacts/vsix

      - name: Stage platform VSIX files
        if: steps.context.outputs.build == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: better-todo-tree-pr-${{ steps.context.outputs.pull-request-number }}-staging-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/vsix/*.vsix
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          archive: true

  publish:
    needs: test-build
    if: needs.test-build.outputs.build == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.test-build.outputs.targets) }}

    steps:
      - name: Download staged VSIX files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: better-todo-tree-pr-${{ needs.test-build.outputs.pull-request-number }}-staging-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/vsix

      - name: Upload ${{ matrix.target }} VSIX
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          path: artifacts/vsix/better-todo-tree-pr-${{ needs.test-build.outputs.pull-request-number }}-${{ matrix.target }}.vsix
          if-no-files-found: error
          retention-days: 30
          archive: false
          overwrite: true

  cleanup-staging:
    needs:
      - test-build
      - publish
    if: always() && needs.test-build.outputs.build == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read

    steps:
      - name: Check out trusted cleanup helper
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version-file: .nvmrc

      - name: Remove staged VSIX artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_VSIX_API_RETRY_ATTEMPTS: 4
          PR_VSIX_API_RETRY_BASE_MS: 1000
          PR_VSIX_API_RETRY_MAX_MS: 60000
          PR_VSIX_STAGING_NAME: better-todo-tree-pr-${{ needs.test-build.outputs.pull-request-number }}-staging-${{ github.run_id }}-${{ github.run_attempt }}
        run: node scripts/ci/delete-pr-vsix-staging.mjs
