name: Reusable Build VSIX

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to build from.
        required: true
        type: string
      release_tag:
        description: Stable release tag to mirror into the packaged Marketplace changelog.
        required: false
        type: string
      targets:
        description: JSON array of VSIX targets to build.
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(inputs.targets) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Render Marketplace changelog
        if: ${{ inputs.release_tag != '' }}
        run: bash scripts/release/render-marketplace-changelog.sh --through-tag "${{ inputs.release_tag }}"

      - name: Build VSIX
        run: node scripts/release/build-vsix.mjs ${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vsix-${{ matrix.target }}
          path: artifacts/vsix/*-${{ matrix.target }}.vsix
          if-no-files-found: error
