name: Reusable Build VSIX

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to build from.
        required: true
        type: string
      release_tag:
        description: Stable release tag to mirror into the packaged Marketplace changelog.
        required: false
        type: string
      targets:
        description: JSON array of VSIX targets to build.
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(inputs.targets) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Render Marketplace changelog
        if: ${{ inputs.release_tag != '' }}
        run: bash scripts/release/render-marketplace-changelog.sh --through-tag "${{ inputs.release_tag }}"

      - name: Build VSIX
        run: node scripts/release/build-vsix.mjs ${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: vsix-${{ matrix.target }}
          path: artifacts/vsix/*-${{ matrix.target }}.vsix
          if-no-files-found: error
