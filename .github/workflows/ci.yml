name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Build production bundle
        run: npm run vscode:prepublish

      - name: Build smoke-test VSIX
        run: |
          rm -rf artifacts/vsix
          SKIP_PREPUBLISH=1 node scripts/release/build-vsix.mjs linux-x64

      - name: Upload smoke-test VSIX
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: better-todo-tree-linux-x64-vsix
          path: artifacts/vsix/*-linux-x64.vsix
          if-no-files-found: error
